name: CI FULLCLEAN

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: ./apps/api

      - name: Run tests
        run: npm test
        working-directory: ./apps/api

      - name: Grant execute permission for vitest
        run: chmod +x node_modules/.bin/vitest
        working-directory: ./apps/api

      - name: Run tests
        run: npm test
        working-directory: ./apps/api