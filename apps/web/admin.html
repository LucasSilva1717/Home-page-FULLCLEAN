<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FullClean - Painel Administrativo</title>
  <link rel="stylesheet" href="./Assets/CSS/output.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex min-h-screen">

  <aside class="w-64 bg-slate-900 text-white flex flex-col justify-between hidden md:flex shrink-0 shadow-xl">
    <div>
      <div class="p-6 border-b border-slate-800 flex items-center justify-center gap-2">
        <span class="text-xl font-bold tracking-wider text-emerald-400">FullClean</span>
        <span class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded font-mono">v1.0</span>
      </div>
      <nav class="p-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
          Orçamentos
        </a>
        <a href="./orcamento.html" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          Ver Formulário
        </a>
      </nav>
    </div>
    <div class="p-4 border-t border-slate-800">
      <div class="flex items-center gap-3 px-2 py-1">
        <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center font-bold text-slate-900">A</div>
        <div>
          <p class="text-sm font-medium text-slate-200">Admin</p>
          <p class="text-xs text-slate-400">Painel de Controlo</p>
        </div>
      </div>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0">
    <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 shrink-0">
      <h1 class="text-xl font-bold text-slate-900">Gestão de Pedidos</h1>
      <button onclick="fetchBudgets()" class="flex items-center gap-2 px-3 py-1.5 text-xs font-semibold bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 rounded-lg border border-slate-200 transition-all cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.253 8H18"></path></svg>
        Atualizar Dados
      </button>
    </header>

    <div class="p-6 space-y-6 flex-1 overflow-y-auto">
      
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total de Pedidos</p>
          <p id="total-count" class="text-3xl font-bold text-slate-900 mt-2">0</p>
        </div>
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Status da API</p>
          <p id="api-status" class="text-sm font-semibold text-amber-500 mt-4 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span> Verificando...
          </p>
        </div>
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Última Sincronização</p>
          <p id="last-update" class="text-sm font-mono text-slate-500 mt-4">-</p>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="p-4 border-b border-slate-100 bg-slate-50/50">
          <h2 class="font-semibold text-slate-900">Pedidos Recebidos</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="border-b border-slate-200 bg-slate-50 text-xs font-semibold uppercase text-slate-500 tracking-wider">
                <th class="p-4">Cliente</th>
                <th class="p-4">Serviço</th>
                <th class="p-4">Contacto</th>
                <th class="p-4">Localização / CEP</th>
                <th class="p-4">Mensagem</th>
                <th class="p-4">Data</th>
              </tr>
            </thead>
            <tbody id="budget-table-body" class="divide-y divide-slate-100 text-sm text-slate-600">
              <tr>
                <td colspan="6" class="p-8 text-center text-slate-400">
                  Carregando os pedidos de orçamentos...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script>

    if (sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
        window.location.href = 'login.html';
    }
    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const API_URL = isLocalhost 
    ? 'http://localhost:3333/budget-requests' 
    : 'https://sua-api-production.up.railway.app/budget-requests';

    async function fetchBudgets() {
      const tableBody = document.getElementById('budget-table-body');
      const totalCount = document.getElementById('total-count');
      const apiStatus = document.getElementById('api-status');
      const lastUpdate = document.getElementById('last-update');

      try {
        const response = await fetch(API_URL);
        
        if (!response.ok) {
          throw new Error('Resposta inválida do servidor');
        }

        const budgets = await response.json();
        
            if (totalCount) totalCount.innerText = budgets.length;
        if (lastUpdate) lastUpdate.innerText = new Date().toLocaleTimeString('pt-BR');
        if (apiStatus) {
          apiStatus.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Online';
          apiStatus.className = "text-sm font-semibold text-emerald-500 mt-4 flex items-center gap-2";
        }

        if (budgets.length === 0) {
          tableBody.innerHTML = `
            <tr>
              <td colspan="6" class="p-8 text-center text-slate-400">
                Nenhum orçamento encontrado no banco de dados.
              </td>
            </tr>`;
          return;
        }

        tableBody.innerHTML = budgets.map(budget => {
          const date = budget.createdAt 
            ? new Date(budget.createdAt).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' })
            : '-';

          return `
            <tr class="hover:bg-slate-50/70 transition-colors">
              <td class="p-4 font-medium text-slate-900">
                <div>${budget.name}</div>
                <div class="text-xs text-slate-400 font-normal">${budget.email}</div>
              </td>
              <td class="p-4">
                <span class="px-2.5 py-1 text-xs font-medium bg-emerald-50 text-emerald-700 rounded-full border border-emerald-100">
                  ${budget.serviceType}
                </span>
              </td>
              <td class="p-4 font-mono">${budget.phone}</td>
              <td class="p-4">
                <div>${budget.neighborhood}, ${budget.state}</div>
                <div class="text-xs text-slate-400">${budget.zipCode}</div>
              </td>
              <td class="p-4 max-w-xs truncate" title="${budget.message || ''}">
                ${budget.message || '<span class="text-slate-300 italic">Sem mensagem</span>'}
              </td>
              <td class="p-4 text-slate-400 text-xs">${date}</td>
            </tr>
          `;
        }).join('');

      } catch (error) {
        console.error('Erro na requisição da API:', error);
        
        if (apiStatus) {
          apiStatus.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span> Offline';
          apiStatus.className = "text-sm font-semibold text-red-500 mt-4 flex items-center gap-2";
        }

        tableBody.innerHTML = `
          <tr>
            <td colspan="6" class="p-8 text-center text-red-500 font-medium bg-red-50/40">
              <p>Não foi possível conectar ao servidor backend.</p>
              <p class="text-xs text-slate-500 font-normal mt-1">
                Certifique-se de que a API está ativa no terminal rodando na porta 3333.
              </p>
            </td>
          </tr>`;
      }
    }

    window.onload = fetchBudgets;
  </script>
</body>
</html>
